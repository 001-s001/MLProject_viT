seed: 42
output_dir: runs/cifar10_vit_patch8

dataset:
  name: cifar10
  data_dir: ./data
  image_size: 32
  batch_size: 128
  num_workers: 2
  val_ratio: 0.1
  seed: 42

model:
  name: simple_vit
  image_size: 32
  patch_size: 8
  num_classes: 10
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  dropout: 0.1

training:
  epochs: 50
  lr: 0.0003
  weight_decay: 0.05
  label_smoothing: 0.1

