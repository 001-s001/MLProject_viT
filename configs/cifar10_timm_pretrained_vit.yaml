seed: 42
output_dir: runs/cifar10_timm_pretrained_vit

dataset:
  name: cifar10
  data_dir: ./data
  image_size: 224
  batch_size: 64
  num_workers: 2
  val_ratio: 0.1
  seed: 42

model:
  name: timm_vit
  model_name: vit_tiny_patch16_224
  pretrained: true
  num_classes: 10

training:
  epochs: 20
  lr: 0.0001
  weight_decay: 0.05
  label_smoothing: 0.1

